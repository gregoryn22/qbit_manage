name: Sync Upstream via PR

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: "Upstream owner/repo"
        required: false
        default: "StuffAnThings/qbit_manage"
      upstream_branch:
        description: "Upstream branch to sync from"
        required: false
        default: "master"
      sync_branch:
        description: "Dedicated sync branch in this repo"
        required: false
        default: "sync/upstream"
      personal_branch:
        description: "Personal branch that receives reviewed sync PRs"
        required: false
        default: "master"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: upstream-sync-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPO: ${{ github.event.inputs.upstream_repo || 'StuffAnThings/qbit_manage' }}
      UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch || 'master' }}
      SYNC_BRANCH: ${{ github.event.inputs.sync_branch || 'sync/upstream' }}
      PERSONAL_BRANCH: ${{ github.event.inputs.personal_branch || 'master' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch remotes with full history
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch --prune origin
          git fetch --prune upstream

      - name: Ensure dedicated sync branch exists
        run: |
          if git ls-remote --exit-code --heads origin "${SYNC_BRANCH}" >/dev/null; then
            git checkout -B "${SYNC_BRANCH}" "origin/${SYNC_BRANCH}"
          else
            git checkout -B "${SYNC_BRANCH}" "upstream/${UPSTREAM_BRANCH}"
          fi

      - name: Update sync branch from upstream
        run: |
          git merge --ff-only "upstream/${UPSTREAM_BRANCH}" || git merge --no-edit "upstream/${UPSTREAM_BRANCH}"
          git push origin "HEAD:refs/heads/${SYNC_BRANCH}"

      - name: Open or update sync PR into personal branch
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:${process.env.SYNC_BRANCH}`;
            const base = process.env.PERSONAL_BRANCH;
            const title = `chore(sync): ${process.env.UPSTREAM_REPO}@${process.env.UPSTREAM_BRANCH} -> ${base}`;
            const body = [
              "Automated upstream sync PR.",
              "",
              `- Source: \`${process.env.UPSTREAM_REPO}:${process.env.UPSTREAM_BRANCH}\``,
              `- Sync branch: \`${process.env.SYNC_BRANCH}\``,
              `- Target (personal): \`${base}\``,
              "",
              "Review and merge after checks pass."
            ].join("\n");

            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              head,
              base
            });

            if (prs.length > 0) {
              const pr = prs[0];
              core.info(`Updating existing PR #${pr.number}`);
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                title,
                body
              });
              return;
            }

            core.info("Creating new sync PR");
            await github.rest.pulls.create({
              owner,
              repo,
              title,
              head,
              base,
              body
            });
