name: Docker Build (Fork Testing)

on:
  push:
    branches: [ feat/pending_cleanup ]   # or whatever branch you use for testing
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Required for pushing to ghcr.io

    steps:
      - name: Set lower case owner name
        run: echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Check Out Repo
        uses: actions/checkout@v6

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read version from VERSION file
        id: get_version
        run: echo "APP_VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Set build metadata
        id: build_meta
        run: |
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "VCS_REF=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Dockerfile
          build-args: |
            APP_VERSION=${{ steps.get_version.outputs.APP_VERSION }}
            BUILD_DATE=${{ steps.build_meta.outputs.BUILD_DATE }}
            VCS_REF=${{ steps.build_meta.outputs.VCS_REF }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/qbit_manage:test-${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/qbit_manage:testing